spring:
  config:
    activate:
      on-profile: local

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8080
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1
        - id: chat-service
          uri: http://chat-service:8080
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=1
      default-filters:
        - PreserveHostHeader
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
